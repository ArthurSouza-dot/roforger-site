<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RoForger — Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#040608;--bg2:#080c12;--bg3:#0d1420;--border:#1a2535;--accent:#00aaff;--green:#00e5b0;--red:#ff4444;--text:#c8d8e8;--muted:#3a5070;--white:#e8f0f8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.2;pointer-events:none;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 75%)}
  .orb-1{position:fixed;width:400px;height:400px;background:#00aaff10;top:-100px;left:-100px;border-radius:50%;filter:blur(80px);pointer-events:none}
  .orb-2{position:fixed;width:300px;height:300px;background:#ff6a000d;bottom:-80px;right:-80px;border-radius:50%;filter:blur(80px);pointer-events:none}
  .card{position:relative;z-index:10;width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;text-align:center;animation:fadeUp .5s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
  .corner{position:absolute;width:16px;height:16px;border-color:var(--accent);border-style:solid;opacity:.4}
  .corner-tl{top:12px;left:12px;border-width:1px 0 0 1px}.corner-tr{top:12px;right:12px;border-width:1px 1px 0 0}
  .corner-bl{bottom:12px;left:12px;border-width:0 0 1px 1px}.corner-br{bottom:12px;right:12px;border-width:0 1px 1px 0}
  .logo-icon{width:64px;height:64px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:var(--accent);box-shadow:0 0 20px #00aaff30}
  .logo-name{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--white);letter-spacing:3px;margin-bottom:4px}
  .logo-name span{color:var(--accent)}
  .logo-sub{font-size:.75rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
  .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 20px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:border-color .2s,box-shadow .2s,background .2s}
  .btn-google:hover{border-color:var(--accent);background:#0d1a2a;box-shadow:0 0 20px #00aaff30}
  .btn-google:disabled{opacity:.5;cursor:not-allowed}
  .status-msg{margin-top:16px;font-size:.82rem;color:var(--muted);min-height:20px}
  .status-msg.loading{color:var(--accent)}.status-msg.error{color:var(--red)}.status-msg.ok{color:var(--green)}
  .card-footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted);letter-spacing:1px}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid #00aaff30;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Tela de sucesso */
  .success{display:none;text-align:center;padding:10px 0}
  .success-icon{font-size:3rem;margin-bottom:16px}
  .success-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:var(--green);letter-spacing:2px;margin-bottom:10px}
  .success-sub{font-size:.85rem;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="orb-1"></div><div class="orb-2"></div>

<div class="card">
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>

  <!-- FORM DE LOGIN -->
  <div id="auth-form">
    <div class="logo-icon">RF</div>
    <div class="logo-name">Ro<span>Forger</span></div>
    <div class="logo-sub">Autenticação Google</div>

    <button class="btn-google" id="btn-google" onclick="loginGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>

    <div class="status-msg" id="status-msg"></div>
    <div class="card-footer">RoForger Pro v2.0 · Clique para autorizar e voltar ao app</div>
  </div>

  <!-- TELA DE SUCESSO -->
  <div class="success" id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">AUTORIZADO!</div>
    <div class="success-sub">
      Bem-vindo, <strong id="success-name" style="color:var(--white)"></strong>!<br><br>
      Retornando ao RoForger...<br>
      <span style="color:var(--muted);font-size:.75rem">Pode fechar esta aba se não fechar automaticamente.</span>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyAOR6UGedU-0yUgQ9I6QsOyTYwkH9z6TkA",
    authDomain:        "roforger-ca0c4.firebaseapp.com",
    databaseURL:       "https://roforger-ca0c4-default-rtdb.firebaseio.com",
    projectId:         "roforger-ca0c4",
    storageBucket:     "roforger-ca0c4.firebasestorage.app",
    messagingSenderId: "999264568857",
    appId:             "1:999264568857:web:741ab9ea0656e7cbb60c88",
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  const setStatus = (msg, cls='') => {
    const el = document.getElementById('status-msg');
    el.innerHTML = msg; el.className = 'status-msg ' + cls;
  };

  window.loginGoogle = async () => {
    const btn = document.getElementById('btn-google');
    btn.disabled = true;
    setStatus('<span class="spin"></span> Abrindo Google...', 'loading');

    try {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;
      const token  = await user.getIdToken();

      // Monta os dados do usuário
      const userData = JSON.stringify({
        uid:         user.uid,
        email:       user.email,
        displayName: user.displayName,
        photoURL:    user.photoURL,
        token,
      });

      // Mostra tela de sucesso PRIMEIRO
      document.getElementById('auth-form').style.display     = 'none';
      document.getElementById('success-screen').style.display = 'block';

      // Redireciona para roforger:// após 1.5s
      const encoded = encodeURIComponent(userData);
      setTimeout(() => {
        window.location.href = `roforger://auth?token=${encoded}`;
      }, 1500);

    } catch(err) {
      setStatus('Erro: ' + err.message, 'error');
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
