<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoForger Pro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #040608;
    --bg2:      #080c12;
    --bg3:      #0d1420;
    --border:   #1a2535;
    --accent:   #00aaff;
    --accent2:  #0066cc;
    --orange:   #ff6a00;
    --orange2:  #ff9500;
    --text:     #c8d8e8;
    --muted:    #3a5070;
    --white:    #e8f0f8;
    --glow:     0 0 20px #00aaff40;
    --glow-o:   0 0 20px #ff6a0040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    -webkit-app-region: drag;
  }

  /* ── BG GRID ── */
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: .25;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 75%);
    pointer-events: none;
  }

  /* ── SCAN LINE ── */
  .scanline {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,170,255,.015) 2px,
      rgba(0,170,255,.015) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* ── GLOW ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .orb-1 { width: 400px; height: 400px; background: #00aaff12; top: -100px; left: -100px; }
  .orb-2 { width: 300px; height: 300px; background: #ff6a0010; bottom: -80px; right: -80px; }

  /* ── WIN CONTROLS ── */
  .win-controls {
    position: fixed;
    top: 12px; right: 12px;
    display: flex; gap: 6px;
    z-index: 100;
    -webkit-app-region: no-drag;
  }
  .win-btn {
    width: 12px; height: 12px;
    border-radius: 50%; border: none; cursor: pointer;
  }
  .wb-close    { background: #ff5f57; }
  .wb-minimize { background: #ffbd2e; }
  .wb-maximize { background: #28c840; }

  /* ── CARD ── */
  .card {
    position: relative; z-index: 10;
    width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    -webkit-app-region: no-drag;
    animation: fadeUp .6s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  /* ── LOGO ── */
  .logo-wrap { margin-bottom: 32px; }
  .logo-icon {
    width: 72px; height: 72px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent);
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
  }
  .logo-icon::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #00aaff15, transparent);
  }
  .logo-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 3px;
  }
  .logo-name span { color: var(--accent); }
  .logo-sub {
    font-size: .85rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 28px 0;
    font-size: .78rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* ── GOOGLE BTN ── */
  .btn-google {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 14px 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: border-color .2s, box-shadow .2s, background .2s;
    -webkit-app-region: no-drag;
  }
  .btn-google:hover {
    border-color: var(--accent);
    background: #0d1a2a;
    box-shadow: var(--glow);
  }
  .btn-google:active { transform: scale(.98); }
  .btn-google svg { flex-shrink: 0; }

  /* ── STATUS ── */
  .status-msg {
    margin-top: 20px;
    font-size: .82rem;
    color: var(--muted);
    min-height: 20px;
    transition: color .3s;
  }
  .status-msg.loading { color: var(--accent); }
  .status-msg.error   { color: #ff4444; }
  .status-msg.ok      { color: #00e5b0; }

  /* ── FOOTER ── */
  .card-footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── CORNER DECO ── */
  .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--accent);
    border-style: solid;
    opacity: .5;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanline"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="win-controls">
  <button class="win-btn wb-close"    onclick="window.electronAPI?.close()"></button>
  <button class="win-btn wb-minimize" onclick="window.electronAPI?.minimize()"></button>
  <button class="win-btn wb-maximize" onclick="window.electronAPI?.maximize()"></button>
</div>

<div class="card">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="logo-wrap">
    <div class="logo-icon">RF</div>
    <div class="logo-name">Ro<span>Forger</span></div>
    <div class="logo-sub">Pro Studio</div>
  </div>

  <div class="divider">Entrar com</div>

  <button class="btn-google" id="btn-google" onclick="loginGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continuar com Google
  </button>

  <div class="status-msg" id="status-msg"></div>

  <div class="card-footer">
    RoForger Pro v2.0 · Seus projetos salvos na nuvem
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp }       from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyAOR6UGedU-0yUgQ9I6QsOyTYwkH9z6TkA",
    authDomain:        "roforger-ca0c4.firebaseapp.com",
    databaseURL:       "https://roforger-ca0c4-default-rtdb.firebaseio.com",
    projectId:         "roforger-ca0c4",
    storageBucket:     "roforger-ca0c4.firebasestorage.app",
    messagingSenderId: "999264568857",
    appId:             "1:999264568857:web:741ab9ea0656e7cbb60c88",
    measurementId:     "G-2BQ8SXVZNH"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  const setStatus = (msg, cls = '') => {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = 'status-msg ' + cls;
  };

  // Se já estiver logado, vai direto pro dashboard
  onAuthStateChanged(auth, user => {
    if (user) {
      setStatus('Bem-vindo de volta, ' + user.displayName + '!', 'ok');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    }
  });

  window.loginGoogle = async () => {
    const btn = document.getElementById('btn-google');
    btn.disabled = true;
    setStatus('Abrindo login Google...', 'loading');
    try {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;
      setStatus('Login realizado! Redirecionando...', 'ok');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    } catch (err) {
      console.error(err);
      setStatus('Erro: ' + (err.message || 'Tente novamente'), 'error');
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
